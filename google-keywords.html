<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyword Intelligence Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0f1a; font-family: 'Plus Jakarta Sans', sans-serif; color: #e2e8f0; }
        .glass { background: rgba(23, 28, 41, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gold-nugget { border: 2px solid #fbbf24; box-shadow: 0 0 20px rgba(251, 191, 36, 0.15); }
        .loader { border-top-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold tracking-tight mb-3 bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent">
                Global Keyword Insight Engine
            </h1>
            <p class="text-slate-400">Decode Google's Autocomplete signals to find low-competition opportunities.</p>
        </header>

        <div class="glass p-6 rounded-2xl mb-10 shadow-2xl">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="flex flex-col">
                    <label class="text-xs font-bold text-slate-500 mb-2 uppercase">Target Market</label>
                    <select id="country" class="bg-slate-900 border-none rounded-xl p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="sa">🇸🇦 Saudi Arabia</option>
                        <option value="ae">🇦🇪 UAE</option>
                        <option value="tn">🇹🇳 Tunisia</option>
                        <option value="qa">🇶🇦 Qatar</option>
                        <option value="eg">🇪🇬 Egypt</option>
                        <option value="jo">🇯🇴 Jordan</option>
                        <option value="kw">🇰🇼 Kuwait</option>
                        <option value="bh">🇧🇭 Bahrain</option>
                        <option value="us">🇺🇸 USA</option>
                        <option value="gb">🇬🇧 UK</option>
                        <option value="fr">🇫🇷 France</option>
                        <option value="de">🇩🇪 Germany</option>
                        <option value="jp">🇯🇵 Japan</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label class="text-xs font-bold text-slate-500 mb-2 uppercase">Language</label>
                    <select id="lang" class="bg-slate-900 border-none rounded-xl p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="en">English</option>
                        <option value="ar">Arabic (العربية)</option>
                        <option value="fr">French</option>
                        <option value="ja">Japanese</option>
                    </select>
                </div>
                <div class="flex flex-col md:col-span-2">
                    <label class="text-xs font-bold text-slate-500 mb-2 uppercase">Seed Keyword</label>
                    <div class="flex gap-2">
                        <input type="text" id="keyword" placeholder="Search strategy (e.g., 'how to...')" 
                               class="flex-1 bg-slate-900 border-none rounded-xl p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none">
                        <button onclick="startAnalysis()" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-bold transition-all shadow-lg shadow-blue-900/20">
                            Analyze
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="loading" class="hidden flex flex-col items-center justify-center py-20">
            <div class="loader w-12 h-12 border-4 border-slate-800 rounded-full mb-4"></div>
            <p class="text-slate-400 animate-pulse">Querying Google Global Nodes...</p>
        </div>

        <div id="results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        // Mapping the codes you asked about to plain English meanings
        const CODE_INTERPRETER = {
            512: { label: "Standard", icon: "📝", color: "text-emerald-400", desc: "Pure search query. High ranking potential with quality content." },
            433: { label: "Entity", icon: "🏢", color: "text-red-400", desc: "Major brand, book, or entity detected. High competition." },
            131: { label: "Rich Media", icon: "🎬", color: "text-amber-400", desc: "Triggers videos/images. Video SEO strategy recommended." },
            650: { label: "Navigational", icon: "🔗", color: "text-blue-400", desc: "Direct brand search. Users looking for a specific website." },
            22:  { label: "Local", icon: "📍", color: "text-purple-400", desc: "Triggers Google Maps. Vital for physical business lead gen." }
        };

        function startAnalysis() {
            const q = document.getElementById('keyword').value;
            const gl = document.getElementById('country').value;
            const hl = document.getElementById('lang').value;
            
            if(!q) return alert("Enter a seed keyword first!");

            document.getElementById('results').innerHTML = "";
            document.getElementById('loading').classList.remove('hidden');

            // JSONP Implementation: Direct fetch without Proxy
            const oldScript = document.getElementById('google-api-script');
            if(oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = 'google-api-script';
            script.src = `https://suggestqueries.google.com/complete/search?client=chrome&q=${encodeURIComponent(q)}&gl=${gl}&hl=${hl}&callback=processGoogleData`;
            document.body.appendChild(script);
        }

        window.processGoogleData = function(data) {
            document.getElementById('loading').classList.add('hidden');
            const grid = document.getElementById('results');
            
            const terms = data[1];
            const meta = data[4];
            const relevance = meta["google:suggestrelevance"];
            const subtypes = meta["google:suggestsubtypes"];

            terms.forEach((term, i) => {
                const score = relevance[i];
                const codes = subtypes[i] || [512];
                
                // Identify "Gold Nuggets": High relevance + no high-competition subtypes
                const isGold = score > 580 && codes.length === 1 && codes[0] === 512;

                const card = document.createElement('div');
                card.className = `glass p-6 rounded-2xl transition-all hover:-translate-y-1 ${isGold ? 'gold-nugget' : ''}`;
                
                let analysisHtml = codes.map(code => {
                    const info = CODE_INTERPRETER[code] || { label: "General", icon: "🔍", color: "text-slate-400", desc: "Standard search behavior." };
                    return `
                        <div class="flex gap-3 mb-3">
                            <span class="text-xl">${info.icon}</span>
                            <div>
                                <p class="text-sm font-bold ${info.color}">${info.label}</p>
                                <p class="text-[11px] text-slate-500 leading-tight">${info.desc}</p>
                            </div>
                        </div>
                    `;
                }).join('');

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-black bg-slate-800 px-2 py-1 rounded text-slate-400">SCORE: ${score}</span>
                        ${isGold ? '<span class="text-[10px] font-black bg-amber-500 text-black px-2 py-1 rounded">💰 GOLD NUGGET</span>' : ''}
                    </div>
                    <h3 class="text-lg font-bold mb-5 text-white">${term}</h3>
                    <div class="border-t border-white/5 pt-4">
                        <p class="text-[10px] text-slate-600 font-bold uppercase tracking-wider mb-3">Hidden Signals</p>
                        ${analysisHtml}
                    </div>
                    <div class="mt-4 pt-4 border-t border-white/5">
                         <p class="text-xs ${isGold ? 'text-emerald-400' : 'text-slate-500'} italic">
                            ${isGold ? '→ High priority: Create a detailed blog post or guide.' : '→ Competitive: Analyze top 3 results before building.'}
                         </p>
                    </div>
                `;
                grid.appendChild(card);
            });
        };
    </script>
</body>
</html>
